<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Doktor Odilbek - Tanani Anglash</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --light:  #DAD2D8;
    --dark:   #143642;
    --teal:   #0F8B8D;
    --amber:  #EC9A29;
    --white:  #FFFFFF;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(20,54,66,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #eceaea; color: var(--dark);
    min-height: 100vh; overflow-x: hidden;
  }

  .topbar {
    background: var(--dark); padding: 14px 18px 10px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 10px;
  }
  .topbar-logo {
    width: 36px; height: 36px; background: var(--teal);
    border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .topbar-logo svg { width: 20px; height: 20px; }
  .topbar-title .main { color: var(--white); font-size: 15px; font-weight: 700; line-height: 1.2; }
  .topbar-title .sub  { color: var(--teal); font-size: 11px; margin-top: 1px; }

  .block-tabs {
    display: flex; background: var(--dark);
    padding: 0 10px 10px; gap: 6px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .block-tabs::-webkit-scrollbar { display: none; }
  .block-tab {
    flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.55); white-space: nowrap;
  }
  .block-tab.active { background: var(--teal); color: var(--white); }

  .content { padding: 16px; max-width: 620px; margin: 0 auto; }
  .content-with-nav { padding-bottom: 90px; }

  .loading { text-align: center; padding: 60px 20px; color: var(--dark); opacity: 0.5; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid var(--light); border-top-color: var(--teal);
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fff8ec; border: 1px solid var(--amber);
    border-radius: var(--radius); padding: 20px; text-align: center; margin: 20px 0;
  }
  .error-box h3 { color: var(--amber); margin-bottom: 8px; }
  .error-box p  { font-size: 13px; opacity: 0.8; }

  .block-hero {
    background: linear-gradient(135deg, var(--dark) 0%, #1e6070 100%);
    border-radius: var(--radius); padding: 18px; margin-bottom: 18px;
    box-shadow: var(--shadow); animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .block-hero-num   { font-size: 11px; font-weight: 600; color: var(--teal); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .block-hero-title { font-size: 19px; font-weight: 800; color: var(--white); line-height: 1.3; margin-bottom: 10px; }
  .block-hero-stats { display: flex; gap: 18px; }
  .stat { display: flex; align-items: center; gap: 5px; font-size: 12px; color: rgba(255,255,255,0.6); }
  .stat svg { width: 13px; height: 13px; }

  .player-card {
    background: var(--white); border-radius: var(--radius);
    overflow: hidden; box-shadow: var(--shadow); margin-bottom: 20px; animation: fadeUp 0.3s ease;
  }
  .video-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
  .video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; border: none; }

  .ios-fallback {
    position: absolute; top:0; left:0; width:100%; height:100%;
    background: linear-gradient(135deg, var(--dark), #1e6070);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    cursor: pointer;
  }
  .ios-fallback .play-circle {
    width: 64px; height: 64px; background: var(--teal); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(15,139,141,0.5);
  }
  .ios-fallback .play-circle svg { width: 28px; height: 28px; margin-left: 4px; }
  .ios-fallback p { color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 600; text-align: center; padding: 0 20px; }
  .ios-fallback small { color: rgba(255,255,255,0.5); font-size: 11px; }

  .player-info { padding: 13px 16px; }
  .now-playing-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(15,139,141,0.1); color: var(--teal);
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .now-playing-badge::before {
    content: ''; width: 6px; height: 6px; background: var(--teal); border-radius: 50%;
    animation: pulse 1.2s ease infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  .player-lesson-title { font-size: 15px; font-weight: 700; color: var(--dark); line-height: 1.3; margin-bottom: 3px; }
  .player-module-name  { font-size: 12px; color: var(--dark); opacity: 0.45; }

  .module-section { margin-bottom: 14px; animation: fadeUp 0.3s ease; }
  .module-header {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: var(--white); border-radius: var(--radius);
    cursor: pointer; box-shadow: var(--shadow); user-select: none;
    transition: background 0.15s; margin-bottom: 2px;
  }
  .module-header:active { background: #f4f4f4; }
  .module-num {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--dark); color: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .module-name  { flex: 1; font-size: 14px; font-weight: 600; color: var(--dark); line-height: 1.3; }
  .module-count { font-size: 11px; color: var(--dark); opacity: 0.4; white-space: nowrap; }
  .chevron { width: 20px; height: 20px; color: var(--dark); opacity: 0.3; transition: transform 0.25s; flex-shrink: 0; }
  .module-header.open .chevron { transform: rotate(90deg); }

  .lessons-list { display: none; flex-direction: column; gap: 2px; padding-left: 8px; }
  .lessons-list.open { display: flex; }
  .lesson-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    background: var(--white); border-radius: 12px;
    cursor: pointer; user-select: none;
    transition: background 0.15s, transform 0.1s;
    border-left: 3px solid transparent;
  }
  .lesson-item:active  { transform: scale(0.99); background: #f0f9f9; }
  .lesson-item.playing { border-left-color: var(--teal); background: linear-gradient(to right,rgba(15,139,141,0.06),var(--white)); }
  .lesson-item.no-video { cursor: default; }
  .lesson-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--light); color: var(--dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .lesson-item.playing .lesson-num { background: var(--teal); color: var(--white); }
  .lesson-text { flex: 1; font-size: 14px; color: var(--dark); line-height: 1.3; }
  .lesson-item.no-video .lesson-text { opacity: 0.4; }
  .video-icon    { width: 18px; height: 18px; color: var(--teal); flex-shrink: 0; }
  .no-video-icon { width: 18px; height: 18px; color: var(--dark); opacity: 0.2; flex-shrink: 0; }

  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white); border-top: 1px solid var(--light);
    padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; z-index: 50;
  }
  .nav-btn {
    flex: 1; padding: 12px; border-radius: 12px;
    border: 2px solid var(--light); background: var(--white);
    font-size: 13px; font-weight: 600; color: var(--dark);
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn.primary { background: var(--teal); border-color: var(--teal); color: var(--white); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn svg { width: 16px; height: 16px; }

  .watermark {
    position: fixed;
    bottom: 80px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dark);
    opacity: 0.045;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }

  /* Lock screen */
  #lockScreen {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: var(--dark);
    flex-direction: column; align-items: center; justify-content: center;
    padding: 32px; text-align: center;
  }
  #lockScreen .lock-icon {
    width: 72px; height: 72px; background: rgba(255,255,255,0.08);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
  }
  #lockScreen .lock-icon svg { width: 36px; height: 36px; color: var(--amber); }
  #lockScreen h2 { color: var(--white); font-size: 20px; font-weight: 700; margin-bottom: 12px; }
  #lockScreen p  { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
  #lockScreen .lock-btn {
    background: var(--teal); color: var(--white);
    border: none; border-radius: 14px;
    padding: 14px 28px; font-size: 15px; font-weight: 700;
    cursor: pointer; width: 100%; max-width: 280px;
  }
</style>
</head>
<body>

<!-- Lock screen -->
<div id="lockScreen">
  <div class="lock-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h2>Kirish cheklangan</h2>
  <p>Ushbu kurs faqat guruh a'zolari uchun mavjud. Davom etish uchun guruhga qo'shiling.</p>
  <button class="lock-btn" onclick="tg?.close()">Yopish</button>
</div>

<div class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24" fill="white">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
    </svg>
  </div>
  <div class="topbar-title">
    <div class="main">Doktor Odilbek</div>
    <div class="sub">Tanani Anglash</div>
  </div>
</div>

<div class="block-tabs" id="blockTabs"></div>

<div class="content content-with-nav" id="mainContent">
  <div class="loading"><div class="spinner"></div><div>Ma'lumotlar yuklanmoqda...</div></div>
</div>

<div class="nav-bar" id="navBar" style="display:none">
  <button class="nav-btn" id="prevBtn" onclick="navigateLesson(-1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Oldingi
  </button>
  <button class="nav-btn primary" id="nextBtn" onclick="navigateLesson(1)">
    Keyingi
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<script>
const SHEET_ID  = '1xxF2BxPtaMOuQCyeO918etm0exBMq2WVyBd8nVD7CCU';
const SHEET_TAB = 'Sheet1';

// Google Sheets JSON quirk: rows with only 1 filled cell are dropped entirely from JSON.
// Block 1 name and Module 1 name end up stored in COLUMN LABELS (cols[0].label / cols[1].label).
// We extract them from json.table.cols at parse time.
// For Bonus block: lessons come directly under block with no module row => synthetic module.

let courseData = {}, allLessons = [], currentBlock = null, currentLesson = null;

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isMobile = isIOS || /Android/i.test(navigator.userAgent);

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
// Deep-link param can arrive via:
// 1. tg.initDataUnsafe.start_param  (bot link: t.me/Bot/app?startapp=1)
// 2. URL ?startapp=N                (web_app button in group chat)
// 3. URL hash #startapp=N           (some Telegram clients)
(function() {
  let sp = tg?.initDataUnsafe?.start_param;
  if (!sp) {
    const urlP = new URLSearchParams(window.location.search).get('startapp');
    const hashP = new URLSearchParams(window.location.hash.replace(/^#/, '')).get('startapp');
    sp = urlP || hashP;
  }
  window._startBlock = sp ? parseInt(sp) : null;
})();

async function loadSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const text = await resp.text();
  return JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/)[1]);
}

function parseSheetData(json) {
  const rows = json.table.rows;
  const cols = json.table.cols || [];
  courseData = {}; allLessons = [];

  // Block 1 name and Module 1 name are stored in column LABELS (not rows).
  // cols[0].label = "Block 1-Blok. Sog'lom ovqatlanish" → extract after "Block "
  // cols[1].label = "Modul 1-modul: Kirish va motivatsiya" → extract after "Modul "
  const colALabel = (cols[0]?.label || '').trim();
  const colBLabel = (cols[1]?.label || '').trim();
  const block1Name = colALabel.replace(/^Block\s*/i, '') || '1-Blok';
  const module1Name = colBLabel.replace(/^Modul\s*/i, '') || '1-modul';

  let curBlock = null, curModule = null;

  // Pre-seed Block 1 and Module 1 from column headers
  if (block1Name) {
    curBlock = block1Name;
    courseData[curBlock] = { title: curBlock, modules: {} };
  }
  if (module1Name && curBlock) {
    curModule = module1Name;
    courseData[curBlock].modules[curModule] = { title: curModule, lessons: [] };
  }

  rows.forEach((row) => {
    const cells = row.c || [];
    const v = i => {
      const cell = cells[i];
      if (!cell || cell.v === null || cell.v === undefined) return '';
      return cell.v.toString().trim();
    };

    const A = v(0), B = v(1), C = v(2), D = v(3), E = v(4), F = v(5);

    // Skip any stray header row
    if (A === 'Block' || A === 'Blok') return;

    // --- BLOCK HEADER: A has value, C and D empty ---
    if (A && !C && !D) {
      curBlock = A;
      curModule = null;
      if (!courseData[curBlock]) courseData[curBlock] = { title: A, modules: {} };
      if (B) {
        curModule = B;
        if (!courseData[curBlock].modules[curModule])
          courseData[curBlock].modules[curModule] = { title: B, lessons: [] };
      }
      return;
    }

    // --- MODULE HEADER: B has value, A/C/D empty ---
    if (!A && B && !C && !D) {
      if (!curBlock) {
        curBlock = block1Name;
        if (!courseData[curBlock]) courseData[curBlock] = { title: curBlock, modules: {} };
      }
      curModule = B;
      if (!courseData[curBlock].modules[curModule])
        courseData[curBlock].modules[curModule] = { title: B, lessons: [] };
      return;
    }

    // --- LESSON ROW: has title (D) or number (C) ---
    if ((D || C) && curBlock) {
      // No module yet (e.g. Bonus block has lessons directly under block header)
      if (!curModule) {
        curModule = curBlock; // use block name as synthetic module name
        if (!courseData[curBlock].modules[curModule])
          courseData[curBlock].modules[curModule] = { title: curBlock, lessons: [] };
      }

      const embed = (E && E !== '#N/A') ? E : '';
      const link  = (F && F !== '#N/A') ? F : '';
      let src = '';
      if (embed.startsWith('<iframe')) { const m = embed.match(/src=["']([^"']+)['"]/); if (m) src = m[1]; }
      else if (embed.startsWith('http')) src = embed;
      else if (link.startsWith('http'))  src = link;

      const uid = `${curBlock}|${curModule}|${C}|${D}`;
      const playerLink = (link.startsWith('http')) ? link : src;
      const lesson = { block: curBlock, module: curModule, lessonNum: C, title: D || 'Dars '+C, iframeSrc: src, playerLink, hasVideo: !!(src || playerLink), uid };
      courseData[curBlock].modules[curModule].lessons.push(lesson);
      if (lesson.hasVideo) allLessons.push(lesson);
    }
  });

  console.log('Blocks found:', Object.keys(courseData));
  Object.entries(courseData).forEach(([bk, bd]) => {
    console.log(bk, '\u2192', Object.keys(bd.modules).length, 'modules',
      Object.values(bd.modules).reduce((s,m)=>s+m.lessons.length,0), 'lessons');
  });
}

function renderBlockTabs() {
  const tabs = document.getElementById('blockTabs');
  tabs.innerHTML = '';
  Object.keys(courseData).forEach((bk, i) => {
    const btn = document.createElement('button');
    btn.className = 'block-tab' + (bk === currentBlock ? ' active' : '');
    btn.textContent = bk;
    btn.dataset.index = i;
    btn.onclick = () => switchBlock(bk);
    tabs.appendChild(btn);
  });
  setTimeout(() => {
    const active = tabs.querySelector('.block-tab.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
  }, 50);
}

function renderBlock(bk) {
  const block = courseData[bk];
  const mods = Object.keys(block.modules);
  const total = mods.reduce((s, mk) => s + block.modules[mk].lessons.length, 0);

  let html = `<div class="block-hero">
    <div class="block-hero-num">Kurs bloki</div>
    <div class="block-hero-title">${esc(block.title)}</div>
    <div class="block-hero-stats">
      <div class="stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        ${mods.length} modul
      </div>
      <div class="stat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
        ${total} dars
      </div>
    </div>
  </div>`;

  mods.forEach((mk, mi) => {
    const mod = block.modules[mk];
    html += `<div class="module-section">
      <div class="module-header" onclick="toggleModule(this)">
        <div class="module-num">${mi+1}</div>
        <div class="module-name">${esc(mod.title)}</div>
        <div class="module-count">${mod.lessons.length} dars</div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="lessons-list">
        ${mod.lessons.map(ls => {
          const idx = allLessons.indexOf(ls);
          const isPlaying = currentLesson?.uid === ls.uid;
          return `<div class="lesson-item ${isPlaying?'playing':''} ${!ls.hasVideo?'no-video':''}"
               ${ls.hasVideo ? `onclick="playLesson(${idx})"` : ''}>
            <div class="lesson-num">${esc(ls.lessonNum)}</div>
            <div class="lesson-text">${esc(ls.title)}</div>
            ${ls.hasVideo
              ? `<svg class="video-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>`
              : `<svg class="no-video-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="8" y1="8" x2="16" y2="16"/></svg>`}
          </div>`;}).join('')}
      </div>
    </div>`;
  });

  const el = document.getElementById('mainContent');
  el.innerHTML = html;
  if (currentLesson && currentLesson.block === bk) injectPlayer();
  const first = el.querySelector('.module-header');
  if (first) openModule(first);
}

function injectPlayer() {
  const ls = currentLesson;
  const content = document.getElementById('mainContent');
  let p = document.getElementById('playerSection');
  if (!p) { p = document.createElement('div'); p.id = 'playerSection'; content.insertBefore(p, content.firstChild); }

  // Always use tap-to-open with playerLink (works on all devices, no DRM issues)
  const openUrl = escA(ls.playerLink || ls.iframeSrc);
  p.innerHTML = `<div class="player-card">
    <div class="video-wrapper">
      <div class="ios-fallback" onclick="openInSafari('${openUrl}')">
        <div class="play-circle">
          <svg viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <p>${esc(ls.title)}</p>
        <small>▶ Videoni ochish uchun bosing</small>
      </div>
    </div>
    <div class="player-info">
      <div class="now-playing-badge">▶ Ijro etilmoqda</div>
      <div class="player-lesson-title">${esc(ls.title)}</div>
      <div class="player-module-name">${esc(ls.module)} · Dars ${esc(ls.lessonNum)}</div>
    </div>
  </div>`;
}

function openInSafari(url) {
  if (tg?.openLink) tg.openLink(url);
  else window.open(url, '_blank');
}

function switchBlock(bk) {
  currentBlock = bk; currentLesson = null;
  renderBlockTabs(); renderBlock(bk);
  document.getElementById('navBar').style.display = 'none';
  window.scrollTo(0, 0);
}

function toggleModule(h) {
  h.classList.contains('open')
    ? (h.classList.remove('open'), h.nextElementSibling.classList.remove('open'))
    : openModule(h);
}
function openModule(h) { h.classList.add('open'); h.nextElementSibling.classList.add('open'); }

function playLesson(idx) {
  const lesson = allLessons[idx];
  if (!lesson) return;
  if (!isMobile) {
    const existing = document.querySelector('#playerSection iframe');
    if (existing) existing.src = '';
  }
  currentLesson = lesson;
  injectPlayer();
  document.querySelectorAll('.lesson-item').forEach(el => {
    const oc = el.getAttribute('onclick') || '';
    el.classList.toggle('playing', oc === `playLesson(${idx})`);
  });
  document.getElementById('playerSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  updateNavBar();
  tg?.HapticFeedback?.impactOccurred('light');
}

function navigateLesson(dir) {
  if (!currentLesson) return;
  const idx = allLessons.findIndex(l => l.uid === currentLesson.uid);
  const next = allLessons[idx + dir];
  if (!next) return;
  if (next.block !== currentBlock) {
    currentBlock = next.block;
    renderBlockTabs(); renderBlock(currentBlock);
    setTimeout(() => { expandFor(next.module); setTimeout(() => playLesson(allLessons.indexOf(next)), 80); }, 80);
  } else {
    expandFor(next.module);
    playLesson(allLessons.indexOf(next));
  }
}

function expandFor(modTitle) {
  document.querySelectorAll('.module-header').forEach(h => {
    if (h.querySelector('.module-name')?.textContent === modTitle) openModule(h);
  });
}

function updateNavBar() {
  document.getElementById('navBar').style.display = 'flex';
  const idx = allLessons.findIndex(l => l.uid === currentLesson.uid);
  document.getElementById('prevBtn').disabled = idx <= 0;
  document.getElementById('nextBtn').disabled = idx >= allLessons.length - 1;
}

function esc(s)  { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return (s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

const MEMBERSHIP_WEBHOOK = 'https://takhatheviking.app.n8n.cloud/webhook/check-member';

async function checkMembership() {
  const userId = tg?.initDataUnsafe?.user?.id;

  // No Telegram context at all = opened in plain browser, allow for dev/preview
  if (!tg) return true;

  // Inside Telegram but no userId = deny
  if (!userId) return false;

  try {
    const res = await fetch(MEMBERSHIP_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId })
    });
    const data = await res.json();
    return data.allowed === true;
  } catch(e) {
    console.warn('Membership check failed:', e);
    return false;
  }
}

async function init() {
  try {
    const allowed = await checkMembership();
    if (!allowed) {
      document.getElementById('lockScreen').style.display = 'flex';
      document.getElementById('mainContent').style.display = 'none';
      document.getElementById('navBar').style.display = 'none';
      return;
    }

    const json = await loadSheet();
    parseSheetData(json);
    const blocks = Object.keys(courseData);
    if (!blocks.length) throw new Error("Jadvalda ma'lumot topilmadi.");
    const n = window._startBlock;
    currentBlock = (n && blocks[n-1]) ? blocks[n-1] : blocks[0];
    renderBlockTabs();
    renderBlock(currentBlock);
    document.getElementById('blockTabs').scrollLeft = 0;
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="error-box">
      <h3>Xatolik yuz berdi</h3>
      <p>${esc(e.message)}</p>
      <p style="margin-top:8px;font-size:12px">Jadval ruxsatini tekshiring: <b>Share → Anyone with the link → Viewer</b></p>
    </div>`;
  }
}
init();
</script>
